name: Deploy With Ansible

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: Image tag to deploy (usually commit SHA)
                required: true
            aws_region:
                description: AWS region
                required: false
                default: eu-west-2

permissions:
    id-token: write
    contents: read

jobs:
    deploy:
        name: Run Ansible Deploy
        runs-on: [self-hosted, linux, x64]
        env:
            IMAGE_TAG: ${{ inputs.image_tag }}
            AWS_REGION: ${{ inputs.aws_region }}
            EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Ansible and AWS Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install ansible boto3 botocore

            - name: Install required Ansible collections
              run: ansible-galaxy collection install -r infra/ansible/requirements.yml

            - name: Configure SSH key (optional)
              if: env.EC2_SSH_PRIVATE_KEY != ''
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa

            - name: Run deploy playbook
              working-directory: infra/ansible
              env:
                  ANSIBLE_HOST_KEY_CHECKING: "False"
              run: |
                  ansible-playbook playbooks/deploy.yml -e "aws_region=${AWS_REGION}"
