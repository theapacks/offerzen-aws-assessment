name: UI CI/CD

on:
  push:
    branches:
      - main
    paths:
      - app/src/client/**
      - .github/workflows/ui.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  call-build-and-push:
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: ui
      context: ./app/src/client
      dockerfile: ./app/src/client/Dockerfile
      target: ""
    secrets: inherit
