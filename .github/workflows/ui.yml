name: UI CI/CD

on:
    push:
        branches:
            - main
        paths:
            - app/src/client/**
            - .github/actions/build-and-push/**
            - .github/actions/deploy-ssm/**
            - .github/workflows/ui.yml
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

env:
    AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
    PROJECT_NAME: ${{ vars.PROJECT_NAME || 'offerzen-aws-assessment' }}
    ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
    AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build and push UI
              uses: ./.github/actions/build-and-push
              with:
                  app_name: ui
                  context: ./app/src/client
                  dockerfile: ./app/src/client/Dockerfile
                  target: ""

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

            - name: Deploy via SSM
              uses: ./.github/actions/deploy-ssm
              with:
                  document_name: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ui-deploy
                  image_tag: ${{ github.sha }}
                  automation_role_arn: ${{ secrets.SSM_AUTOMATION_ROLE_ARN }}
                  target_tag_value: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ui-instance
                  aws_region: ${{ env.AWS_REGION }}
