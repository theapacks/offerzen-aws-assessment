name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - app/src/server/**
      - .github/workflows/backend.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  call-build-and-push:
    uses: ./.github/workflows/_build-and-push.yml
    with:
      app_name: backend
      context: ./app/src/server
      dockerfile: ./app/src/server/Dockerfile
      target: production
    secrets: inherit
