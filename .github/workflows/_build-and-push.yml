name: Build and Push to ECR (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: "App name (backend or ui)"
      context:
        required: true
        type: string
        description: "Docker build context path"
      dockerfile:
        required: true
        type: string
        description: "Path to Dockerfile"
      target:
        required: true
        type: string
        description: "Docker build target (empty string if not using multi-stage)"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'offerzen-aws-assessment' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}

jobs:
  build-and-push:
    name: Build and push ${{ inputs.app_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          REPO="${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/${{ inputs.app_name }}"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$REPO:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
