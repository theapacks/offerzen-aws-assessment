name: Build and Push to ECR
description: Build and push a Docker image to Amazon ECR

inputs:
  app_name:
    description: App name (backend or ui)
    required: true
  context:
    description: Docker build context path
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: true
  target:
    description: Docker build target (empty string if not using multi-stage)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set image tags
      id: meta
      shell: bash
      run: |
        REPO="${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/${{ inputs.app_name }}"
        echo "repo=$REPO" >> "$GITHUB_OUTPUT"
        echo "sha_tag=$REPO:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target }}
        push: true
        tags: |
          ${{ steps.meta.outputs.sha_tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
