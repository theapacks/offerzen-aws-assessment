- name: Prepare hosts with Docker and ECR login
  hosts: backend:ui
  become: true
  tasks:
    - name: Install Docker, pip, and AWS CLI
      ansible.builtin.dnf:
        name:
          - docker
          - python3-pip
          - awscli
        state: present

    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name: docker
        executable: pip3

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add runtime user to docker group
      ansible.builtin.user:
        name: "{{ container_runtime_user }}"
        groups: docker
        append: true

    - name: Log in to ECR
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} \
          | docker login --username AWS --password-stdin {{ ecr_registry }}
      args:
        executable: /bin/bash

- name: Deploy backend container
  hosts: backend
  become: true
  tasks:
    - name: Pull backend image
      community.docker.docker_image:
        name: "{{ backend_image }}"
        source: pull

    - name: Run backend container
      community.docker.docker_container:
        name: "{{ backend_container_name }}"
        image: "{{ backend_image }}"
        state: started
        restart_policy: always
        recreate: true
        published_ports:
          - "{{ backend_host_port }}:{{ backend_container_port }}"
        env:
          PORT: "{{ backend_container_port }}"

- name: Deploy UI container
  hosts: ui
  become: true
  tasks:
    - name: Pull UI image
      community.docker.docker_image:
        name: "{{ ui_image }}"
        source: pull

    - name: Run UI container
      community.docker.docker_container:
        name: "{{ ui_container_name }}"
        image: "{{ ui_image }}"
        state: started
        restart_policy: always
        recreate: true
        published_ports:
          - "{{ ui_host_port }}:{{ ui_container_port }}"
        env:
          SERVER_URL: "{{ ui_server_url }}"
